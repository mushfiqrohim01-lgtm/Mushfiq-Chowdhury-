<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushfiq's Personal Website</title>
    <style>
        /* পুরো ওয়েবসাইটের সাধারণ ডিজাইন */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* প্রোফাইল কার্ডের ডিজাইন */
        .profile-card {
            background-color: #162447;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        /* প্রোফাইল পিকচারের গোল ফ্রেম */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #e43f5a;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #e43f5a;
        }

        p {
            font-size: 16px;
            color: #b8b5ff;
            line-height: 1.5;
        }

        /* সুন্দর বাটন বা সোশ্যাল লিংক */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #e43f5a;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff2e63;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- এখানে আপনার পছন্দের যেকোনো ছবির লিংক বসাতে পারেন -->
        <img class="profile-img" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" alt="Profile Picture">
        
        <h1>Mushfiqur Rahim</h1>
        <p>ওয়েব ডেভেলপমেন্টের দুনিয়ায় আপনাকে স্বাগতম! এটি আমার তৈরি প্রথম ওয়েবসাইট।</p>
        
        <!-- আপনার ফেসবুক বা যেকোনো প্রোফাইলের লিংক দিতে পারেন নিচে -->
        <a href="https://github.com/mushfiqrohim01-lgtm" target="_blank" class="btn">আমার সাথে যোগাযোগ করুন</a>
    </div>

</body>
</html>
