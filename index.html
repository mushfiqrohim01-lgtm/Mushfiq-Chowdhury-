<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushfiqur Rahim - My Books</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background-color: #162447;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 90%;
            margin-bottom: 30px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #e43f5a;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #e43f5a;
        }

        p {
            font-size: 16px;
            color: #b8b5ff;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
            text-align: center;
        }

        .btn-fb { background-color: #1877f2; }
        .btn-fb:hover { background-color: #145dbf; }
        .btn-insta { background-color: #e1306c; }
        .btn-insta:hover { background-color: #b81d51; }

        /* বইয়ের সেকশন */
        .books-section {
            width: 90%;
            max-width: 600px;
            background-color: #1f4068;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .books-section h2 {
            color: #e43f5a;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 2px solid #e43f5a;
            padding-bottom: 10px;
        }

        .book-card {
            background-color: #162447;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .book-img {
            width: 120px;
            height: 180px;
            object-fit: cover;
            border-radius: 5px;
            border: 2px solid #b8b5ff;
            margin-bottom: 10px;
        }

        .book-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin: 5px 0;
        }

        .book-desc {
            font-size: 14px;
            color: #dfdbff;
            font-style: italic;
            line-height: 1.4;
            margin: 10px 0 0 0;
            background-color: #1a1a2e;
            padding: 8px;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
