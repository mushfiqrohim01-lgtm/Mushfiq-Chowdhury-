<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushfiqur Rahim</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background-color: #162447;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #e43f5a;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #e43f5a;
        }

        p {
            font-size: 16px;
            color: #b8b5ff;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-fb {
            background-color: #1877f2;
        }

        .btn-fb:hover {
            background-color: #145dbf;
        }

        .btn-insta {
            background-color: #e1306c;
        }

        .btn-insta:hover {
            background-color: #b81d51;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- এখানে আপনার ছবির সঠিক নাম 'IMG_8840.jpg' বসানো হয়েছে -->
        <img class="profile-img" src="IMG_8840.jpg" alt="Mushfiqur Rahim">
        
        <h1>Mushfiqur Rahim</h1>
        <p>ওয়েব ডেভেলপমেন্টের দুনিয়ায় আপনাকে স্বাগত! এটি আমার তৈরি প্রথম পার্সোনাল ওয়েবসাইট।</p>
        
        <div class="btn-container">
            <a href="https://www.facebook.com/share/1BWQSyaM8P/" target="_blank" class="btn btn-fb">Facebook-এ যুক্ত হোন</a>
            <a href="https://www.instagram.com/mushfiq_22?igsh=MXdjdGcyMGh4ZDZyNA==" target="_blank" class="btn btn-insta">Instagram-এ ফলো করুন</a>
        </div>
    </div>

</body>
</html>
